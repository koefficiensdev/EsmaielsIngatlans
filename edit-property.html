<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Property | IngatlanHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="main.html">IngatlanHub</a>
      <nav class="main-nav">
        <a href="profile.html">Back to Profile</a>
      </nav>
    </header>

    <main>
      <section class="section-title-row">
        <h1>Edit Listing</h1>
      </section>

      <form id="editPropertyForm" class="property-form">
        <div class="form-grid">
          <label>Listing Title
            <input name="title" type="text" required />
          </label>
          <label>Property Type
            <select name="type" required>
              <option value="apartment">Apartment</option>
              <option value="house">House</option>
            </select>
          </label>
          <label>For
            <select name="mode" required>
              <option value="rent">Rent</option>
              <option value="sale">Sale</option>
            </select>
          </label>
          <label>Status
            <select name="status" required>
              <option value="active">Active</option>
              <option value="archived">Archived</option>
            </select>
          </label>
          <label>Price (HUF)
            <input name="price" type="number" min="0" required />
          </label>
          <label>City
            <input name="city" type="text" required />
          </label>
          <label>District / Area
            <input name="district" type="text" />
          </label>
          <label>Address
            <input name="address" type="text" required />
          </label>
          <label>Size (m2)
            <input name="sizeM2" type="number" min="1" required />
          </label>
          <label>Rooms
            <input name="rooms" type="number" min="1" step="0.5" required />
          </label>
          <label>Latitude
            <input name="lat" type="number" step="0.000001" required />
          </label>
          <label>Longitude
            <input name="lon" type="number" step="0.000001" required />
          </label>
          <label>Contact Name
            <input name="contactName" type="text" required />
          </label>
          <label>Contact Phone
            <input name="contactPhone" type="text" required />
          </label>
          <label>Add New Images (Optional)
            <input name="images" type="file" multiple accept="image/*" />
          </label>
        </div>

        <label>Description
          <textarea name="description" rows="7" required></textarea>
        </label>

        <button type="submit" class="btn primary">Save Changes</button>
        <p id="editMessage" class="auth-message"></p>
      </form>
    </main>

    <script type="module" src="assets/js/edit-property.js"></script>
  </body>
</html>
